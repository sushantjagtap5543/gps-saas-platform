worker_processes  auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  server_tokens   off;

  # Security headers
  add_header X-Frame-Options         SAMEORIGIN   always;
  add_header X-Content-Type-Options  nosniff      always;
  add_header X-XSS-Protection       "1; mode=block" always;

  # Gzip compression
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   5;
  gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;

  # Rate limiting zones
  limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # Upstreams (FIXED: backend runs on 5024, not 3000)
  upstream backend  { server backend:5024  max_fails=3 fail_timeout=30s; }
  upstream frontend { server frontend:80   max_fails=3 fail_timeout=10s; }
  upstream admin    { server gps-admin:80  max_fails=3 fail_timeout=10s; }

  # ── HTTP server — serves the app on port 80 ───────────────────
  # SSL is configured as an OPTIONAL add-on via Step 4 SSL script.
  # Do NOT redirect port 80 to HTTPS until a cert is actually installed.
  server {
    listen 80;
    server_name _;

    # ACME challenge for Let's Encrypt cert issuance
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # ── REST API ───────────────────────────────────────────────
    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "upgrade";
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_read_timeout 90s;
      proxy_buffering off;
    }

    # ── WebSocket / Socket.IO ─────────────────────────────────
    location /socket.io/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade            $http_upgrade;
      proxy_set_header   Connection         "upgrade";
      proxy_set_header   Host               $host;
      proxy_set_header   X-Real-IP          $remote_addr;
      proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto  $scheme;
    }

    # ── Admin Panel ────────────────────────────────────────────
    location /admin {
      proxy_pass         http://admin;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Customer Portal (Frontend) ─────────────────────────────
    location / {
      proxy_pass         http://frontend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      error_page 404 /index.html;
    }
  }

  # Optional: HTTPS server (uncomment after SSL cert is installed)
  # server {
  #   listen 443 ssl http2;
  #   server_name _;
  #
  #   ssl_certificate     /etc/nginx/ssl/cert.pem;
  #   ssl_certificate_key /etc/nginx/ssl/key.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_prefer_server_ciphers on;
  #
  #   # ... (repeat all location blocks from HTTP server above)
  # }
}
