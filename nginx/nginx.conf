worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  server_tokens off;

  upstream backend  { server backend:3000; }
  upstream frontend { server frontend:80; }
  upstream admin    { server gps-admin:80; }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml;

  limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

  # ── HTTP — redirects to HTTPS when SSL is available ────────────
  server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect everything else to HTTPS if cert exists; otherwise serve directly
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS ────────────────────────────────────────────────────────
  # Comment out this entire server block if you have no SSL certificate yet.
  # After getting a cert with certbot, uncomment and restart nginx.
  # server {
  #   listen 443 ssl;
  #   server_name yourdomain.com;
  #
  #   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #
  #   include /etc/nginx/conf.d/common_proxy.conf;
  # }

  # ── HTTP-only server (for initial setup without SSL) ─────────────
  server {
    listen 8080;
    server_name _;

    # Frontend (customer portal)
    location / {
      proxy_pass http://frontend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST API
    location /api/ {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
    }

    # Auth — stricter rate limit (overlapping prefix, must come AFTER /api/)
    location /api/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health endpoint — no rate limit
    location /health {
      proxy_pass http://backend;
      proxy_set_header Host $host;
    }

    # WebSocket (Socket.IO) — long-lived connection
    location /socket.io/ {
      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    # Admin panel — accessible at /admin/
    location /admin/ {
      proxy_pass http://admin/;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}

# ── TCP passthrough for GPS hardware devices ─────────────────────────────────
stream {
  upstream gps_tcp { server tcp-server:5000; }
  server {
    listen 5000;
    proxy_pass            gps_tcp;
    proxy_timeout         120s;
    proxy_connect_timeout 10s;
  }
}
