# ================================================================
# GPS SaaS — Nginx Production Config
# Handles: HTTP→HTTPS redirect, SPA routing, WebSocket, TCP proxy
# ================================================================

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       mime.types;
  default_type  application/octet-stream;

  # Security
  server_tokens off;
  add_header X-Frame-Options           SAMEORIGIN   always;
  add_header X-Content-Type-Options    nosniff      always;
  add_header X-XSS-Protection         "1; mode=block" always;
  add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

  # Performance
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  keepalive_requests 100;

  # Gzip
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   6;
  gzip_min_length   256;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml
    application/rss+xml image/svg+xml;

  # Client limits
  client_max_body_size    1m;
  client_body_buffer_size 16k;

  # Proxy defaults
  proxy_http_version 1.1;
  proxy_set_header   Host              $host;
  proxy_set_header   X-Real-IP         $remote_addr;
  proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
  proxy_set_header   X-Forwarded-Proto $scheme;
  proxy_connect_timeout 5s;
  proxy_send_timeout    30s;
  proxy_read_timeout    30s;

  # Rate limiting zones
  limit_req_zone  $binary_remote_addr zone=api:10m  rate=60r/m;
  limit_req_zone  $binary_remote_addr zone=auth:10m rate=10r/m;
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  # Upstreams
  upstream backend  { server backend:3000  max_fails=3 fail_timeout=30s; }
  upstream frontend { server frontend:80   max_fails=3 fail_timeout=10s; }
  upstream admin    { server gps-admin:80  max_fails=3 fail_timeout=10s; }

  # ── HTTP Server ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # When no SSL: serve directly on port 80
    # When SSL is set up: uncomment the redirect below and comment out everything else
    # return 301 https://$host$request_uri;

    # ─── Locations (HTTP, no SSL) ────────────────────────────────
    include /etc/nginx/conf.d/locations.conf;
  }

  # HTTPS_BEGIN
  # # ── HTTPS Server — uncomment after SSL setup ──────────────────
  # server {
  #   listen 443 ssl;
  #   server_name _;
  #
  #   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #
  #   ssl_protocols             TLSv1.2 TLSv1.3;
  #   ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
  #   ssl_prefer_server_ciphers off;
  #   ssl_session_cache         shared:SSL:10m;
  #   ssl_session_timeout       10m;
  #
  #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  #
  #   include /etc/nginx/conf.d/locations.conf;
  # }
  # HTTPS_END
}

# ── TCP passthrough for GPS hardware devices ─────────────────────
stream {
  upstream gps_tcp { server tcp-server:5000; }

  server {
    listen 5000;
    proxy_pass            gps_tcp;
    proxy_timeout         120s;
    proxy_connect_timeout 10s;
    proxy_protocol        off;
  }
}
