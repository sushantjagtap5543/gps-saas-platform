# ================================================================
# Shared location blocks — included by both HTTP and HTTPS servers
# ================================================================

limit_conn addr 50;

# ── Frontend (customer portal) ───────────────────────────────────
location / {
  proxy_pass http://frontend;
}

# ── REST API ─────────────────────────────────────────────────────
location /api/ {
  limit_req  zone=api burst=30 nodelay;
  proxy_pass http://backend;
  proxy_read_timeout 30s;
}

# ── Auth endpoints (stricter rate limit) ─────────────────────────
location /api/auth/ {
  limit_req  zone=auth burst=5 nodelay;
  proxy_pass http://backend;
}

# ── Billing webhook (skip rate limit — Razorpay needs reliable delivery) ──
location /api/billing/webhook {
  proxy_pass http://backend;
}

# ── Health check (unrestricted — used by monitoring) ─────────────
location /health {
  proxy_pass http://backend;
  access_log off;
}

# ── Prometheus metrics (restrict to localhost only) ───────────────
location /metrics {
  allow 127.0.0.1;
  deny  all;
  proxy_pass http://backend;
}

# ── Socket.IO (WebSocket upgrade) ────────────────────────────────
location /socket.io/ {
  proxy_pass         http://backend;
  proxy_set_header   Upgrade    $http_upgrade;
  proxy_set_header   Connection "upgrade";
  proxy_read_timeout 86400s;
  proxy_send_timeout 86400s;
}

# ── Admin panel ───────────────────────────────────────────────────
location /admin/ {
  proxy_pass http://admin/;
}

# ── Deny hidden files ─────────────────────────────────────────────
location ~ /\. {
  deny all;
  access_log off;
  log_not_found off;
}
