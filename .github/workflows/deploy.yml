name: Deploy GPS SaaS

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  BACKEND_IMAGE: yourdockerhub/backend
  TCP_IMAGE: yourdockerhub/tcp-server
  FRONTEND_IMAGE: yourdockerhub/frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t $BACKEND_IMAGE:latest ./backend
          docker push $BACKEND_IMAGE:latest

      - name: Build & Push TCP Server
        run: |
          docker build -t $TCP_IMAGE:latest ./tcp-server
          docker push $TCP_IMAGE:latest

      - name: Build & Push Frontend
        run: |
          docker build -t $FRONTEND_IMAGE:latest ./gps-admin
          docker push $FRONTEND_IMAGE:latest

      - name: Deploy to Kubernetes
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.K8S_SERVER }}
          username: ${{ secrets.K8S_USER }}
          key: ${{ secrets.K8S_SSH_KEY }}
          script: |
            kubectl rollout restart deployment backend -n gps-saas
            kubectl rollout restart deployment tcp-server -n gps-saas
            kubectl rollout restart deployment worker -n gps-saas