name: Deploy GPS SaaS → AWS Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:   # Allow manual deploys from GitHub UI

env:
  DOCKER_REGISTRY: ${{ secrets.DOCKER_USERNAME }}
  BACKEND_IMAGE:   ${{ secrets.DOCKER_USERNAME }}/gps-backend
  TCP_IMAGE:       ${{ secrets.DOCKER_USERNAME }}/gps-tcp-server
  FRONTEND_IMAGE:  ${{ secrets.DOCKER_USERNAME }}/gps-frontend
  ADMIN_IMAGE:     ${{ secrets.DOCKER_USERNAME }}/gps-admin
  NOTIFY_IMAGE:    ${{ secrets.DOCKER_USERNAME }}/gps-notifications

jobs:
  # ── Build & Push Docker Images ─────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          cache-from: type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.BACKEND_IMAGE }}:buildcache,mode=max
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & Push TCP Server
        uses: docker/build-push-action@v5
        with:
          context: ./tcp-server
          push: true
          cache-from: type=registry,ref=${{ env.TCP_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.TCP_IMAGE }}:buildcache,mode=max
          tags: |
            ${{ env.TCP_IMAGE }}:latest
            ${{ env.TCP_IMAGE }}:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_SOCKET_URL=/
          cache-from: type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.FRONTEND_IMAGE }}:buildcache,mode=max
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Build & Push Admin Panel
        uses: docker/build-push-action@v5
        with:
          context: ./gps-admin
          push: true
          build-args: |
            VITE_API_URL=/api
            VITE_SOCKET_URL=/
          cache-from: type=registry,ref=${{ env.ADMIN_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.ADMIN_IMAGE }}:buildcache,mode=max
          tags: |
            ${{ env.ADMIN_IMAGE }}:latest
            ${{ env.ADMIN_IMAGE }}:${{ github.sha }}

      - name: Build & Push Notifications
        uses: docker/build-push-action@v5
        with:
          context: ./notifications
          push: true
          cache-from: type=registry,ref=${{ env.NOTIFY_IMAGE }}:buildcache
          cache-to:   type=registry,ref=${{ env.NOTIFY_IMAGE }}:buildcache,mode=max
          tags: |
            ${{ env.NOTIFY_IMAGE }}:latest
            ${{ env.NOTIFY_IMAGE }}:${{ github.sha }}

  # ── Deploy to Lightsail ────────────────────────────────────────
  deploy:
    name: Deploy to Lightsail
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key:      ${{ secrets.LIGHTSAIL_SSH_KEY }}
          timeout:  120s
          script: |
            set -e

            echo "📦 Starting deployment at $(date)"

            # Clone on first deploy
            if [ ! -d ~/gps-saas-platform/.git ]; then
              echo "First deployment — cloning repo..."
              git clone https://github.com/${{ github.repository }} ~/gps-saas-platform
            fi

            cd ~/gps-saas-platform

            # Pull latest code
            git fetch origin
            git reset --hard origin/main

            # Pull latest Docker images (built in CI — fast pull, no build needed)
            docker compose -f docker-compose.2gb.yml pull \
              backend tcp-server frontend gps-admin notifications

            # Rolling restart — keep DB and Redis running
            docker compose -f docker-compose.2gb.yml up -d \
              --no-deps --no-build \
              tcp-server notifications frontend gps-admin

            docker compose -f docker-compose.2gb.yml up -d \
              --no-deps --no-build \
              backend

            sleep 10

            docker compose -f docker-compose.2gb.yml up -d \
              --no-deps --no-build \
              nginx

            # Remove old/unused images to save disk space
            docker image prune -f

            # Health check
            sleep 20
            HEALTH=$(curl -sf http://localhost:3000/health || echo '{"status":"ERROR"}')
            STATUS=$(echo "$HEALTH" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','?'))" 2>/dev/null || echo "?")
            echo "✅ Deploy complete | API status: $STATUS | $(date)"

            if [ "$STATUS" = "OK" ] || [ "$STATUS" = "DEGRADED" ]; then
              echo "Deployment successful!"
            else
              echo "WARNING: Health check returned: $STATUS"
              docker compose -f docker-compose.2gb.yml logs --tail=30 backend
              exit 1
            fi
