name: Deploy GPS SaaS to AWS Lightsail

on:
  push:
    branches: [main]

env:
  BACKEND_IMAGE:  ${{ secrets.DOCKER_USERNAME }}/gps-backend
  TCP_IMAGE:      ${{ secrets.DOCKER_USERNAME }}/gps-tcp-server
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/gps-frontend
  ADMIN_IMAGE:    ${{ secrets.DOCKER_USERNAME }}/gps-admin
  NOTIFY_IMAGE:   ${{ secrets.DOCKER_USERNAME }}/gps-notifications

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Build & Push TCP Server
        uses: docker/build-push-action@v5
        with:
          context: ./tcp-server
          push: true
          tags: ${{ env.TCP_IMAGE }}:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:latest

      - name: Build & Push Admin
        uses: docker/build-push-action@v5
        with:
          context: ./gps-admin
          push: true
          tags: ${{ env.ADMIN_IMAGE }}:latest

      - name: Build & Push Notifications
        uses: docker/build-push-action@v5
        with:
          context: ./notifications
          push: true
          tags: ${{ env.NOTIFY_IMAGE }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to AWS Lightsail
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key:      ${{ secrets.LIGHTSAIL_SSH_KEY }}
          script: |
            set -e
            cd ~/gps-saas-platform
            git pull origin main
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deployed at $(date)"
