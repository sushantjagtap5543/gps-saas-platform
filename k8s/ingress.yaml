apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gps-ingress
  namespace: gps-saas
spec:
  rules:
    - host: api.yourdomain.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 80