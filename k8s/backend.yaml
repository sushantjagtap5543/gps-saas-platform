apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gps-saas
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: your-dockerhub/backend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: gps-saas
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 3000