apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: gps-saas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: your-dockerhub/backend:latest
          command: ["node", "src/workers/gps.worker.js"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets