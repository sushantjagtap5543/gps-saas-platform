apiVersion: apps/v1
kind: Deployment
metadata:
  name: tcp-server
  namespace: gps-saas
spec:
  replicas: 3
  selector:
    matchLabels:
      app: tcp-server
  template:
    metadata:
      labels:
        app: tcp-server
    spec:
      containers:
        - name: tcp-server
          image: your-dockerhub/tcp-server:latest
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: tcp-server
  namespace: gps-saas
spec:
  type: LoadBalancer
  selector:
    app: tcp-server
  ports:
    - port: 5000
      targetPort: 5000