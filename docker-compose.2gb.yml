# ================================================================
# GPS SaaS — Docker Compose (AWS Lightsail 2GB Optimized)
# Memory budget: 2048MB RAM + 2048MB swap = 4096MB total
#
# Service memory allocations:
#   postgres      : 300MB (shared_buffers=64MB tuned for 2GB)
#   redis         : 128MB
#   backend       : 300MB (Node.js + workers)
#   tcp-server    : 128MB
#   notifications :  64MB
#   frontend      :  64MB (nginx serving static files)
#   gps-admin     :  64MB (nginx serving static files)
#   nginx         : 128MB
#   ─────────────────────
#   Total soft:    1176MB  (leaves ~800MB for OS + disk cache)
# ================================================================

services:

  # ─── PostgreSQL (tuned for 2GB host) ──────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: gps_postgres
    environment:
      POSTGRES_USER:     gpsuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       gpsdb
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=192MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=50
      -c wal_buffers=8MB
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c min_wal_size=256MB
      -c max_wal_size=1GB
      -c log_min_duration_statement=500
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpsuser -d gpsdb"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 320M
        reservations:
          memory: 128M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis (memory-limited for 2GB host) ──────────────────────
  redis:
    image: redis:7-alpine
    container_name: gps_redis
    command: >
      redis-server
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --loglevel notice
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 140M
        reservations:
          memory: 64M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ─── Backend API + Workers ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gps_backend
    env_file: .env.production
    environment:
      NODE_ENV:          production
      POSTGRES_HOST:     postgres
      POSTGRES_PORT:     "5432"
      POSTGRES_DB:       gpsdb
      POSTGRES_USER:     gpsuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST:        redis
      REDIS_PORT:        "6379"
      # Node.js memory cap — keep below container limit
      NODE_OPTIONS:      "--max-old-space-size=256"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    volumes:
      - backend_logs:/app/logs
      - backend_invoices:/app/invoices
    deploy:
      resources:
        limits:
          memory: 320M
        reservations:
          memory: 128M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ─── TCP Server (GPS Hardware Devices) ────────────────────────
  tcp-server:
    build:
      context: ./tcp-server
      dockerfile: Dockerfile
    container_name: gps_tcp_server
    environment:
      NODE_ENV:    production
      REDIS_HOST:  redis
      REDIS_PORT:  "6379"
      TCP_PORT:    "5000"
      NODE_OPTIONS: "--max-old-space-size=96"
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 140M
        reservations:
          memory: 32M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Notification Worker ───────────────────────────────────────
  notifications:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    container_name: gps_notifications
    environment:
      NODE_ENV:                 production
      REDIS_HOST:               redis
      REDIS_PORT:               "6379"
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      NODE_OPTIONS:             "--max-old-space-size=48"
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 16M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Frontend (Customer Portal) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:    /api
        VITE_SOCKET_URL: /
    container_name: gps_frontend
    expose:
      - "80"
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 16M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Admin Panel ───────────────────────────────────────────────
  gps-admin:
    build:
      context: ./gps-admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL:    /api
        VITE_SOCKET_URL: /
    container_name: gps_admin
    expose:
      - "80"
    deploy:
      resources:
        limits:
          memory: 80M
        reservations:
          memory: 16M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ─── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: gps_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
      - gps-admin
    deploy:
      resources:
        limits:
          memory: 140M
        reservations:
          memory: 32M
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  backend_logs:
    driver: local
  backend_invoices:
    driver: local
  certbot_www:
    driver: local
