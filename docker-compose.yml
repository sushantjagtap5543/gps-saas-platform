version: "3.8"

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: gps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-gps_tracking}
      POSTGRES_USER:     ${DB_USER:-gps_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ChangeThisSecurePassword123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-gps_user} -d ${DB_NAME:-gps_tracking}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gps-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-ChangeThisRedisPassword}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-ChangeThisRedisPassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gps-backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      DB_HOST:     postgres
      REDIS_HOST:  redis
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "5024:5024"
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5024/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── TCP/UDP Device Server ──────────────────────────────────
  tcp-server:
    build:
      context: ./tcp-server
      dockerfile: Dockerfile
    container_name: gps-tcp-server
    restart: unless-stopped
    env_file: .env.production
    environment:
      DB_HOST:    postgres
      REDIS_HOST: redis
      TCP_PORT:   5023
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    ports:
      - "5023:5023/tcp"
      - "5023:5023/udp"

  # ── Frontend (Client Portal) ───────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gps-web
    restart: unless-stopped
    ports:
      - "5025:80"
    depends_on:
      - backend

  # ── Admin Panel ────────────────────────────────────────────
  admin:
    build:
      context: ./gps-admin
      dockerfile: Dockerfile
    container_name: gps-admin-panel
    restart: unless-stopped
    ports:
      - "5026:80"
    depends_on:
      - backend

  # ── Notification Service ───────────────────────────────────
  notifications:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    container_name: gps-notifications
    restart: unless-stopped
    env_file: .env.production
    environment:
      REDIS_HOST: redis
    depends_on:
      redis: { condition: service_healthy }

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gps-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
      - admin

  # ── Database Admin ─────────────────────────────────────────
  adminer:
    image: adminer
    container_name: gps-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  # ── Monitoring ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: gps-prometheus
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.retention.time=30d

  grafana:
    image: grafana/grafana:latest
    container_name: gps-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP:     "false"
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  uploads:
  logs:
  prometheus_data:
  grafana_data:

networks:
  default:
    name: gps-network
