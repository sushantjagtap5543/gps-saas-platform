version: "3.8"

services:
  postgres:
    image: postgis/postgis:15
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

  backend:
    build: ./backend
    restart: always
    env_file: .env.production
    depends_on:
      - postgres
      - redis
  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    restart: always

  tcp-server:
    build: ./tcp-server
    restart: always
    env_file: .env.production
    depends_on:
      - backend

  notifications:
    build: ./notifications
    restart: always
    env_file: .env.production
    depends_on:
      - backend

  nginx:
    image: nginx:stable
    restart: always
    ports:
      - "80:80"
      - "5000:5000"
    volumes:
      - ./nginx/default.conf:/etc/nginx/nginx.conf

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin


    backend:
      build: ./backend
      deploy:
        replicas: 3
      restart: always

volumes:
  pgdata:
  