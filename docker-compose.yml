services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: gps_postgres
    environment:
      POSTGRES_USER: gpsuser
      POSTGRES_PASSWORD: ChangeThisRedisPassword456!@#
      POSTGRES_DB: gpsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: gps_redis
    ports:
      - "6379:6379"
    restart: always

  tcp-server:
    build: ./tcp-server
    container_name: gps_tcp_server
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres
      - DB_USER=gpsuser
      - DB_PASSWORD=ChangeThisRedisPassword456!@#
      - DB_NAME=gpsdb
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    restart: always

  backend:
    build: ./backend
    container_name: gps_backend
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      - DB_HOST=postgres
      - DB_USER=gpsuser
      - DB_PASSWORD=ChangeThisRedisPassword456!@#
      - DB_NAME=gpsdb
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    restart: always

volumes:
  pgdata:
