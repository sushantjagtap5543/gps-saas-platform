version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: gps_postgres
    environment:
      POSTGRES_USER:     gpsuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       gpsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpsuser -d gpsdb"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: always


  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gps_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always


  # ─── Backend API ───────────────────────────────────────────
  backend:
    build: ./backend
    container_name: gps_backend
    env_file: .env.production
    environment:
      PORT:               5024   # ✅ FIXED
      POSTGRES_HOST:      postgres
      POSTGRES_PORT:      5432
      POSTGRES_DB:        gpsdb
      POSTGRES_USER:      gpsuser
      POSTGRES_PASSWORD:  ${POSTGRES_PASSWORD}
      REDIS_HOST:         redis
      REDIS_PORT:         6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5024:5024"   # ✅ FIXED
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5024/health | grep -q '\"status\"' || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 90s
    restart: always


  # ─── TCP GPS Device Server ─────────────────────────────────
  tcp-server:
    build: ./tcp-server
    container_name: gps_tcp_server
    ports:
      - "5000:5000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: always


  # ─── Notification Worker ───────────────────────────────────
  notifications:
    build: ./notifications
    container_name: gps_notifications
    environment:
      REDIS_HOST:               redis
      REDIS_PORT:               6379
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: always


  # ─── Frontend (Customer Portal) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    container_name: gps_frontend
    restart: always


  # ─── Admin Panel ───────────────────────────────────────────
  gps-admin:
    build:
      context: ./gps-admin
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    container_name: gps_admin
    restart: always


  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: gps_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
      - gps-admin
    restart: always


volumes:
  postgres_data:
