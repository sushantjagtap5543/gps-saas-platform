services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgis/postgis:15-3.3
    container_name: gps_postgres
    environment:
      POSTGRES_USER: gpsuser
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: gpsdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gpsuser -d gpsdb"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gps_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  # ─── Backend API ───────────────────────────────────────────
  backend:
    build: ./backend
    container_name: gps_backend
    environment:
      PORT: 5024
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gpsdb
      DB_USER: gpsuser
      DB_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5024:5024"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5024/health | grep -q status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped


  # ─── TCP GPS Device Server ─────────────────────────────────
  tcp-server:
    build: ./tcp-server
    container_name: gps_tcp_server
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: gpsdb
      DB_USER: gpsuser
      DB_PASSWORD: postgres123
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "5000:5000"
    restart: unless-stopped


  # ─── Notification Worker ───────────────────────────────────
  notifications:
    build: ./notifications
    container_name: gps_notifications
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped


  # ─── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    container_name: gps_frontend
    restart: unless-stopped


  # ─── Admin Panel ───────────────────────────────────────────
  gps-admin:
    build:
      context: ./gps-admin
      args:
        VITE_API_URL: /api
        VITE_SOCKET_URL: /
    container_name: gps_admin
    restart: unless-stopped


  # ─── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: gps_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
      - gps-admin
    restart: unless-stopped


volumes:
  postgres_data:
